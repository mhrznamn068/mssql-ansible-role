---
- name: Ensure ansible_facts to get ansible_facts["distribution"]
  setup:
    gather_subset: min

- name: Set fact for unsupported platform/version combination
  set_fact:
    __mssql_assert_unsupported_platform: >-
      {{ (ansible_facts['distribution'] in ['CentOS', 'RedHat'] and
      ansible_facts['distribution_major_version'] is version('7', '=') and
      mssql_version | int == 2022) or (
      ((ansible_facts['distribution'] in ['CentOS', 'RedHat'] and
      ansible_facts['distribution_major_version'] is version('9', '=')) or
      (ansible_facts['distribution'] in ['Fedora'])) and
      mssql_version | int != 2022) }}

- name: Assert fail when used on platform where mssql_version is not supported
  when: __mssql_assert_unsupported_platform | bool
  block:
    - name: Run the role
      vars:
        mssql_password: "p@55w0rD"
        mssql_edition: Evaluation
      include_tasks: tasks/run_role_with_clear_facts.yml

    - name: Unreachable task
      fail:
        msg: The above task must fail
  rescue:
    - name: Assert that the role failed with mssql_version not supported
      assert:
        that: >-
          'You must set the mssql_version variable to one of'
          in ansible_failed_result.msg
          or
          'mssql_ha_configure=true does not support running against EL 7 hosts'
          in ansible_failed_result.msg

    - name: Clean up after the role invocation
      include_tasks: tasks/cleanup.yml

    # Putting end_host into a rescue block results in a failed task
    - name: End unsupported host
      meta: end_host
